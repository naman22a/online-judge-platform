apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  namespace: oj
spec:
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
          - name: POSTGRES_USER
            value: postgres
          - name: POSTGRES_PASSWORD
            value: postgres
          - name: POSTGRES_DB
            value: leetcode          
      volumes:
        - name: postgres-data
          persistentVolumeClaim: 
            claimName: postgres-pvc

