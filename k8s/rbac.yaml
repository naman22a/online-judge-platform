apiVersion: v1
kind: ServiceAccount
metadata:
  name: execution-service-sa
  namespace: oj         
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-manager
  namespace: oj         
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "delete", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: execution-service-job-manager
  namespace: oj          
subjects:
  - kind: ServiceAccount
    name: execution-service-sa
    namespace: oj        
roleRef:
  kind: Role
  name: job-manager
  apiGroup: rbac.authorization.k8s.io