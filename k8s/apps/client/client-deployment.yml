apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-deployment
  namespace: oj
spec:
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client-frontend
        image: naman22a/leetcode-client:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
