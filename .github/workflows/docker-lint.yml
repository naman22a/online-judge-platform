name: Docker Lint

on:
    workflow_call:

jobs:
    validate-dockerfile:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            
            - name: Install Hadolint
              run: sudo apt-get update && sudo apt-get install -y hadolint
              
            - name: Find and Lint all Dockerfiles
              run: find . -name "Dockerfile*" -print0 | xargs -0 hadolint
