name: Docker Build and Push

on:
  workflow_call:
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - users-service
          - auth-service
          - problems-service
          - tags-service
          - companies-service
          - submissions-service
          - execution-service

    steps:
    - uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Run tests in Docker for ${{ matrix.service }}
      run: |
        docker build \
        -f Dockerfile.base \
        --target test \
        --build-arg SERVICE_NAME=${{ matrix.service }} \
        --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
        .

    - name: Build Docker Image for ${{ matrix.service }}
      run: |
        docker build \
          -f Dockerfile.base \
          --build-arg SERVICE_NAME=${{ matrix.service }} \
          --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
          -t ${{ secrets.DOCKER_USERNAME }}/leetcode-${{ matrix.service }}:latest \
          .

    - name: Push Docker Image for ${{ matrix.service }}
      run: docker push ${{ secrets.DOCKER_USERNAME }}/leetcode-${{ matrix.service }}:latest
