name: Deploy
on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy Services
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          set -e

          echo "Pulling latest images..."
          kubectl set image deployment/api-gateway-deployment api-gateway-backend=$DOCKER_USERNAME/leetcode-api-gateway:latest -n oj
          kubectl set image deployment/auth-deployment auth-backend=$DOCKER_USERNAME/leetcode-auth-service:latest -n oj
          kubectl set image deployment/companies-deployment companies-backend=$DOCKER_USERNAME/leetcode-companies-service:latest -n oj
          kubectl set image deployment/execution-deployment execution-backend=$DOCKER_USERNAME/leetcode-execution-service:latest -n oj
          kubectl set image deployment/problems-deployment problems-backend=$DOCKER_USERNAME/leetcode-problems-service:latest -n oj
          kubectl set image deployment/submissions-deployment submissions-backend=$DOCKER_USERNAME/leetcode-submissions-service:latest -n oj
          kubectl set image deployment/tags-deployment tags-backend=$DOCKER_USERNAME/leetcode-tags-service:latest -n oj
          kubectl set image deployment/users-deployment users-backend=$DOCKER_USERNAME/leetcode-users-service:latest -n oj

          echo "Waiting for rollouts..."
          kubectl rollout status deployment/api-gateway-deployment -n oj
          kubectl rollout status deployment/auth-deployment -n oj
          kubectl rollout status deployment/client-deployment -n oj
          kubectl rollout status deployment/companies-deployment -n oj
          kubectl rollout status deployment/execution-deployment -n oj
          kubectl rollout status deployment/problems-deployment -n oj
          kubectl rollout status deployment/submissions-deployment -n oj
          kubectl rollout status deployment/tags-deployment -n oj
          kubectl rollout status deployment/users-deployment -n oj

          echo "Cleaning unused Docker images..."
          docker system prune -af

          echo "Pulling GCC image on node..."
          docker pull gcc:latest

          echo "Deployment completed successfully!"
