name: Code Quality

on:
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup NodeJS
              uses: actions/setup-node@v6
              with:
                  node-version: '20'

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                version: 9

            - name: Run Linter
              run: pnpm lint
