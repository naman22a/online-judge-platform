name: Code Quality

on:
    workflow_call:

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup NodeJS
              uses: actions/setup-node@v4
              with:
                  node-version: '24'

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Install Dependencies
              run: pnpm install

            - name: Run Linter
              run: pnpm lint
